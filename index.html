<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>名額管理 — 第一駕訓班</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f5f4ef; color: #2c2c2a; -webkit-text-size-adjust: 100%; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin: 4px 0 14px; }
  .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .seg { display: inline-flex; background: #e8e6df; border-radius: 10px; padding: 3px; gap: 2px; align-items: center; }
  .seg button { border: 0; background: transparent; padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #5f5e5a; cursor: pointer; }
  .seg button.on { background: #fff; color: #2c2c2a; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .seg .editname { border: 0; background: transparent; color: #9b9a92; cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 6px; }
  .seg .editname:hover { color: #5f5e5a; background: rgba(0,0,0,.05); }
  .spacer { flex: 1; }
  .who { display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #d3d1c7; border-radius: 8px; padding: 4px 6px 4px 11px; font-size: 13px; }
  .who label { color: #9b9a92; }
  .who select { border: 0; background: transparent; font-family: inherit; font-size: 13px; font-weight: 600; color: #2c2c2a; cursor: pointer; padding: 3px; }
  .who select:focus { outline: none; }
  .who .editwho { border: 0; background: transparent; color: #9b9a92; cursor: pointer; font-size: 12px; padding: 3px 5px; border-radius: 6px; }
  .who .editwho:hover { color: #5f5e5a; background: rgba(0,0,0,.05); }
  .status { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; }
  .status.live { background: #e1f5ee; color: #0f6e56; }
  .status.live .dot { background: #1d9e75; }
  .status.connecting { background: #faeeda; color: #854f0b; }
  .status.connecting .dot { background: #ef9f27; }
  .status.err { background: #fcebeb; color: #a32d2d; }
  .status.err .dot { background: #e24b4a; }
  .slot { background: #fff; border: 1px solid #e2e0d8; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
  .slot-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .time { font-size: 17px; font-weight: 600; letter-spacing: .3px; }
  .daygroups { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px){ .daygroups { grid-template-columns: 1fr; } }
  .daygroup { border: 1px solid #e7e4db; border-radius: 12px; padding: 10px 12px 12px; background: #faf9f5; }
  .dg-title { font-size: 14px; font-weight: 600; color: #5f5e5a; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .dg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px){ .cols { grid-template-columns: 1fr; } }
  .col { border: 1px solid #ece9e0; border-radius: 10px; padding: 9px 11px; }
  .col.auto { background: #f0f6fb; border-color: #cfe2f4; }
  .col.man { background: #f3f0fb; border-color: #ddd6f6; }
  .col-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .col-name { font-size: 13px; font-weight: 600; }
  .col.auto .col-name { color: #185fa5; }
  .col.man .col-name { color: #534ab7; }
  .remain { font-size: 12px; font-weight: 500; }
  .remain b { font-size: 17px; }
  .full { color: #a32d2d; }
  .ok-auto { color: #185fa5; }
  .ok-man { color: #534ab7; }
  ul.names { list-style: none; margin: 0 0 8px; padding: 0; }
  ul.names li { display: flex; align-items: center; gap: 4px; padding: 2px 0; font-size: 14px; }
  ul.names li .idx { width: 18px; color: #9b9a92; font-size: 12px; text-align: right; flex-shrink: 0; }
  ul.names li input { flex: 1; border: 1px solid transparent; background: transparent; border-radius: 6px; padding: 5px 6px; font-size: 14px; font-family: inherit; color: #2c2c2a; min-width: 0; }
  ul.names li input:hover { border-color: #d3d1c7; background: #fff; }
  ul.names li input:focus { outline: none; border-color: #888780; background: #fff; }
  ul.names li button.del { border: 0; background: transparent; color: #c0bdb3; cursor: pointer; font-size: 15px; padding: 2px 5px; border-radius: 6px; flex-shrink: 0; }
  ul.names li button.del:hover { color: #a32d2d; background: #faece7; }
  .add { width: 100%; border: 1px dashed #c0bdb3; background: transparent; border-radius: 8px; padding: 6px; font-size: 13px; color: #5f5e5a; cursor: pointer; font-family: inherit; }
  .add:hover { background: #fff; border-color: #888780; }
  .add:disabled { opacity: .4; cursor: not-allowed; }
  .summary { background: #fff; border: 1px solid #e2e0d8; border-radius: 12px; padding: 12px 16px; margin-bottom: 14px; font-size: 13px; color: #5f5e5a; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
  @media (max-width: 520px){ .summary { grid-template-columns: 1fr; } }
  .summary .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .summary b { color: #2c2c2a; }
  .summary .lbl { font-weight: 600; color: #2c2c2a; }
  .tools { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
  .tools button { border: 1px solid #d3d1c7; background: #fff; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; color: #5f5e5a; }
  .tools button:hover { background: #faf9f6; }
  .saved { font-size: 12px; color: #9b9a92; }
  .loading { text-align: center; padding: 60px 20px; color: #9b9a92; font-size: 15px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 100; overflow-y: auto; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; max-width: 560px; width: 100%; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
  .modal h2 { font-size: 17px; margin: 0 0 4px; }
  .modal .sub { font-size: 12px; color: #9b9a92; margin-bottom: 14px; }
  .modal .close { float: right; border: 0; background: transparent; font-size: 20px; color: #9b9a92; cursor: pointer; }
  .log { list-style: none; margin: 0; padding: 0; max-height: 60vh; overflow-y: auto; }
  .log li { padding: 8px 4px; border-bottom: 1px solid #f0eee7; font-size: 13px; display: flex; gap: 8px; align-items: baseline; }
  .log .lt { color: #9b9a92; font-size: 11px; white-space: nowrap; flex-shrink: 0; width: 92px; }
  .log .badge { font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 20px; flex-shrink: 0; }
  .log .badge.add { background: #e1f5ee; color: #0f6e56; }
  .log .badge.del { background: #fcebeb; color: #a32d2d; }
  .log .who2 { font-weight: 600; }
  .log .empty { color: #9b9a92; padding: 16px 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>名額管理 — 第一駕訓班</h1>
  <div class="bar">
    <div class="seg" id="monthseg"></div>
    <div class="seg" id="cohortseg"></div>
    <div class="seg" id="kindseg"></div>
    <div class="spacer"></div>
    <span class="who" id="whoBox">
      <label>操作者</label>
      <select id="whoSelect"></select>
      <button class="editwho" id="editWho" title="編輯操作者名單">\u270e</button>
    </span>
    <span class="status connecting" id="status"><span class="dot"></span>連線中…</span>
  </div>

  <div id="loading" class="loading">載入中，正在連上雲端資料庫…</div>
  <div id="main" style="display:none">
    <div class="summary" id="summary"></div>
    <div id="slots"></div>
    <div class="tools">
      <button id="logBtn">修改紀錄</button>
      <button id="exportBtn">匯出文字</button>
      <button id="resetCohort">清空此頁名單</button>
      <span class="saved" id="savedHint"></span>
    </div>
  </div>
</div>

<div class="modal-bg" id="logModal">
  <div class="modal">
    <button class="close" id="logClose">\u00d7</button>
    <h2>修改紀錄</h2>
    <div class="sub">只記錄加人／刪人，保留最近 60 天，所有地點共用同一份。</div>
    <ul class="log" id="logList"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1J5nOZhFHNGpxQaAaeCcyRXc6JcwmHQI",
  authDomain: "driving-slots-663c4.firebaseapp.com",
  projectId: "driving-slots-663c4",
  storageBucket: "driving-slots-663c4.firebasestorage.app",
  messagingSenderId: "167409842207",
  appId: "1:167409842207:web:84eadad5cd2fcd320d3d2a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const DOC = doc(db, "slots", "shared");

const CAP = { auto: 14, man: 8 };
const COHORTS = ["A","B"];
const LOG_KEEP_MS = 60 * 24 * 60 * 60 * 1000; // 60 天
const DEFAULT_OPERATORS = ["教練A","教練B","櫃台","主任"];
const ADMIN_PW = "admin22102270";

const WEEKDAY_TIMES = ["06:00-08:30","08:30-11:00","12:00-14:30","15:30-18:00","18:30-21:00"];
const WEEKDAY_DG = [
  { key: "mon_thu", label: "週一・週四", color: "#1d9e75" },
  { key: "tue_fri", label: "週二・週五", color: "#d85a30" }
];
const WEEKEND_TIMES = [
  { key: "sat_am", label: "週六 08:30-12:30", color: "#534ab7" },
  { key: "sat_pm", label: "週六 13:30-17:30", color: "#185fa5" },
  { key: "sun_am", label: "週日 08:30-12:30", color: "#d4537e" }
];
const TYPE_LABEL = { auto: "自排", man: "手排" };

let data = null;
let curMonth = null;
let curCohort = "A";
let curKind = "weekday";
let applyingRemote = false;
let saveTimer = null;
let curOperator = localStorage.getItem("operator") || "";

function blankDayGroup(){ return { auto: [], man: [] }; }
function blankWeekdaySlot(){ return { mon_thu: blankDayGroup(), tue_fri: blankDayGroup() }; }
function blankWeekday(){ return WEEKDAY_TIMES.map(()=>blankWeekdaySlot()); }
function blankWeekend(){ return WEEKEND_TIMES.map(()=>blankDayGroup()); }
function blankMonth(name){
  const m = { id: "m"+Math.random().toString(36).slice(2,8), name, cohortNames: { A: "A 梯", B: "B 梯" } };
  COHORTS.forEach(c => m[c] = { weekday: blankWeekday(), weekend: blankWeekend() });
  return m;
}
function blankData(){
  const now = new Date();
  const months = [0,1,2].map(off => {
    const d = new Date(now.getFullYear(), now.getMonth()+off, 1);
    return blankMonth(d.getFullYear()+" 年 "+(d.getMonth()+1)+" 月");
  });
  return { months, operators: DEFAULT_OPERATORS.slice(), log: [] };
}

function migrate(d){
  if (!d || !d.months) return blankData();
  d.months.forEach(m => {
    if (!m.cohortNames) m.cohortNames = { A: "A 梯", B: "B 梯" };
    COHORTS.forEach(c => {
      if (!m[c]) { m[c] = { weekday: blankWeekday(), weekend: blankWeekend() }; return; }
      if (Array.isArray(m[c])) { m[c] = { weekday: m[c], weekend: blankWeekend() }; }
      if (!m[c].weekday) m[c].weekday = blankWeekday();
      if (!m[c].weekend) m[c].weekend = blankWeekend();
    });
  });
  if (!d.operators || !d.operators.length) d.operators = DEFAULT_OPERATORS.slice();
  if (!d.log) d.log = [];
  return d;
}

function pruneLog(){
  if (!data.log) { data.log = []; return; }
  const cutoff = Date.now() - LOG_KEEP_MS;
  data.log = data.log.filter(e => e.t >= cutoff);
}

function addLog(action, name, ctx){
  if (!data.log) data.log = [];
  data.log.push({
    t: Date.now(),
    by: curOperator || "(未選操作者)",
    act: action, // "add" | "del"
    name: name || "",
    ctx: ctx
  });
  pruneLog();
}

function requireAdmin(){
  if (sessionStorage.getItem("adminok") === "1" || localStorage.getItem("adminok") === "1") return true;
  const v = prompt("請輸入管理密碼：");
  if (v === null) return false;
  if (v === ADMIN_PW){
    localStorage.setItem("adminok","1");
    return true;
  }
  alert("密碼錯誤。");
  return false;
}

function setStatus(cls, text){
  const el = document.getElementById("status");
  el.className = "status " + cls;
  el.innerHTML = '<span class="dot"></span>' + text;
}

function flashSaved(){
  const el = document.getElementById("savedHint");
  el.textContent = "已同步 \u2713";
  setTimeout(()=> { if(el.textContent==="已同步 \u2713") el.textContent=""; }, 1500);
}

function pushSave(){
  if (applyingRemote) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(DOC, { payload: JSON.stringify(data), updatedAt: Date.now() });
      flashSaved();
    } catch(e){
      setStatus("err", "儲存失敗");
      console.error(e);
    }
  }, 400);
}

function month(){ return data.months.find(m => m.id === curMonth) || data.months[0]; }
function kindData(){ return month()[curCohort][curKind]; }
function cohortLabel(c){ return month().cohortNames[c] || (c+" 梯"); }
function kindLabel(){ return curKind === "weekday" ? "平日" : "週末"; }

function ctxLabel(timeLabel, dgLabel, type){
  let s = month().name + " / " + cohortLabel(curCohort) + " / " + kindLabel() + " / " + timeLabel;
  if (dgLabel) s += " / " + dgLabel;
  s += " / " + TYPE_LABEL[type];
  return s;
}

function renderWho(){
  const sel = document.getElementById("whoSelect");
  sel.innerHTML = "";
  const ph = document.createElement("option");
  ph.value = ""; ph.textContent = "請選擇…";
  sel.appendChild(ph);
  (data.operators || []).forEach(name => {
    const o = document.createElement("option");
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  });
  if (curOperator && !(data.operators||[]).includes(curOperator)) {
    const o = document.createElement("option");
    o.value = curOperator; o.textContent = curOperator;
    sel.appendChild(o);
  }
  sel.value = curOperator;
  sel.onchange = () => {
    curOperator = sel.value;
    localStorage.setItem("operator", curOperator);
  };
}

document.getElementById("editWho").onclick = () => {
  if (!requireAdmin()) return;
  const cur = (data.operators || []).join("、");
  const v = prompt("操作者名單（用、或逗號分隔）：", cur);
  if (v === null) return;
  const list = v.split(/[、,，]/).map(s => s.trim()).filter(Boolean);
  if (list.length){ data.operators = list; pushSave(); renderWho(); }
};

function renderMonthSeg(){
  const seg = document.getElementById("monthseg");
  seg.innerHTML = "";
  data.months.forEach(m => {
    const b = document.createElement("button");
    b.textContent = m.name;
    if (m.id === curMonth) b.className = "on";
    b.onclick = () => { curMonth = m.id; renderAll(); };
    seg.appendChild(b);
  });
  const edit = document.createElement("button");
  edit.className = "editname"; edit.title = "改月份名稱"; edit.textContent = "\u270e";
  edit.onclick = () => {
    const m = month();
    const v = prompt("月份名稱：", m.name);
    if (v && v.trim()){ m.name = v.trim(); pushSave(); renderAll(); }
  };
  seg.appendChild(edit);
}

function renderCohortSeg(){
  const seg = document.getElementById("cohortseg");
  seg.innerHTML = "";
  COHORTS.forEach(c => {
    const b = document.createElement("button");
    b.textContent = cohortLabel(c);
    if (c === curCohort) b.className = "on";
    b.onclick = () => { curCohort = c; renderAll(); };
    seg.appendChild(b);
  });
  const edit = document.createElement("button");
  edit.className = "editname"; edit.title = "改梯次名稱"; edit.textContent = "\u270e";
  edit.onclick = () => {
    const m = month();
    const v = prompt("「"+cohortLabel(curCohort)+"」改成：", cohortLabel(curCohort));
    if (v && v.trim()){ m.cohortNames[curCohort] = v.trim(); pushSave(); renderAll(); }
  };
  seg.appendChild(edit);
}

function renderKindSeg(){
  const seg = document.getElementById("kindseg");
  seg.innerHTML = "";
  [["weekday","平日"],["weekend","週末"]].forEach(([k,label]) => {
    const b = document.createElement("button");
    b.textContent = label;
    if (k === curKind) b.className = "on";
    b.onclick = () => { curKind = k; renderAll(); };
    seg.appendChild(b);
  });
}

function renderAll(){
  if (!data) return;
  if (!curMonth) curMonth = data.months[0].id;
  renderWho();
  renderMonthSeg();
  renderCohortSeg();
  renderKindSeg();
  renderSlots();
  renderSummary();
}

function renderSummary(){
  const d = kindData();
  let aUsed=0, mUsed=0, units;
  if (curKind === "weekday"){
    units = WEEKDAY_TIMES.length * WEEKDAY_DG.length;
    d.forEach(s => WEEKDAY_DG.forEach(dg => { aUsed += s[dg.key].auto.length; mUsed += s[dg.key].man.length; }));
  } else {
    units = WEEKEND_TIMES.length;
    d.forEach(s => { aUsed += s.auto.length; mUsed += s.man.length; });
  }
  const aTot = CAP.auto*units, mTot = CAP.man*units;
  document.getElementById("summary").innerHTML =
    '<div class="row"><span class="lbl">自排</span><span>剩 <b>'+(aTot-aUsed)+'</b> / '+aTot+'</span></div>'+
    '<div class="row"><span class="lbl">手排</span><span>剩 <b>'+(mTot-mUsed)+'</b> / '+mTot+'</span></div>';
}

function renderSlots(){
  const root = document.getElementById("slots");
  root.innerHTML = "";
  const d = kindData();
  if (curKind === "weekday"){
    WEEKDAY_TIMES.forEach((time, i) => {
      const slot = d[i];
      const div = document.createElement("div");
      div.className = "slot";
      div.innerHTML = '<div class="slot-head"><span class="time">'+time+'</span></div>';
      const dgWrap = document.createElement("div");
      dgWrap.className = "daygroups";
      WEEKDAY_DG.forEach(dg => dgWrap.appendChild(buildDayGroup(slot[dg.key], dg, time)));
      div.appendChild(dgWrap);
      root.appendChild(div);
    });
  } else {
    WEEKEND_TIMES.forEach((t, i) => {
      const slot = d[i];
      const div = document.createElement("div");
      div.className = "slot";
      div.innerHTML = '<div class="slot-head"><span class="dg-dot" style="background:'+t.color+'"></span><span class="time">'+t.label+'</span></div>';
      const cols = document.createElement("div");
      cols.className = "cols";
      cols.appendChild(buildCol(slot, "auto", "自排車", t.label, ""));
      cols.appendChild(buildCol(slot, "man", "手排車", t.label, ""));
      div.appendChild(cols);
      root.appendChild(div);
    });
  }
}

function buildDayGroup(dgData, dg, timeLabel){
  const box = document.createElement("div");
  box.className = "daygroup";
  box.innerHTML = '<div class="dg-title"><span class="dg-dot" style="background:'+dg.color+'"></span>'+dg.label+'</div>';
  const cols = document.createElement("div");
  cols.className = "cols";
  cols.appendChild(buildCol(dgData, "auto", "自排車", timeLabel, dg.label));
  cols.appendChild(buildCol(dgData, "man", "手排車", timeLabel, dg.label));
  box.appendChild(cols);
  return box;
}

function buildCol(dgData, type, label, timeLabel, dgLabel){
  const col = document.createElement("div");
  col.className = "col " + (type === "auto" ? "auto" : "man");
  const cap = CAP[type];
  const list = dgData[type];
  const remain = cap - list.length;
  const okClass = type === "auto" ? "ok-auto" : "ok-man";
  const head = document.createElement("div");
  head.className = "col-head";
  head.innerHTML = '<span class="col-name">'+label+'</span>'+
    '<span class="remain '+(remain<=0?'full':okClass)+'">剩 <b>'+remain+'</b>/'+cap+'</span>';
  col.appendChild(head);
  const ul = document.createElement("ul");
  ul.className = "names";
  list.forEach((name, ni) => {
    const li = document.createElement("li");
    const idx = document.createElement("span");
    idx.className = "idx"; idx.textContent = (ni+1);
    const inp = document.createElement("input");
    inp.value = name; inp.placeholder = "姓名";
    let before = name;
    inp.onfocus = () => { before = inp.value; };
    inp.oninput = () => { list[ni] = inp.value; pushSave(); };
    inp.onchange = () => {
      const after = inp.value.trim();
      if (after && !before.trim()){
        addLog("add", after, ctxLabel(timeLabel, dgLabel, type));
        pushSave();
      }
      before = inp.value;
      renderSummary();
    };
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "\u00d7"; del.title = "刪除";
    del.onclick = () => {
      const removed = (list[ni] || "").trim();
      list.splice(ni,1);
      if (removed) addLog("del", removed, ctxLabel(timeLabel, dgLabel, type));
      pushSave(); renderSlots(); renderSummary();
    };
    li.append(idx, inp, del);
    ul.appendChild(li);
  });
  col.appendChild(ul);
  const add = document.createElement("button");
  add.className = "add";
  add.textContent = remain>0 ? "＋ 加一位" : "已額滿";
  add.disabled = remain<=0;
  add.onclick = () => {
    if (list.length >= cap) return;
    list.push(""); pushSave(); renderSlots(); renderSummary();
  };
  col.appendChild(add);
  return col;
}

// 修改紀錄視窗
function fmtTime(t){
  const d = new Date(t);
  const p = n => String(n).padStart(2,"0");
  return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes());
}
function openLog(){
  pruneLog();
  const ul = document.getElementById("logList");
  ul.innerHTML = "";
  const entries = (data.log || []).slice().sort((a,b)=> b.t - a.t);
  if (!entries.length){
    ul.innerHTML = '<li class="empty">目前沒有紀錄。</li>';
  } else {
    entries.forEach(e => {
      const li = document.createElement("li");
      const actCls = e.act === "add" ? "add" : "del";
      const actTxt = e.act === "add" ? "加入" : "刪除";
      li.innerHTML = '<span class="lt">'+fmtTime(e.t)+'</span>'+
        '<span class="badge '+actCls+'">'+actTxt+'</span>'+
        '<span><span class="who2">'+escapeHtml(e.by)+'</span>　'+escapeHtml(e.name)+
        '<br><span style="color:#9b9a92;font-size:11px">'+escapeHtml(e.ctx||"")+'</span></span>';
      ul.appendChild(li);
    });
  }
  document.getElementById("logModal").classList.add("show");
}
function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
document.getElementById("logBtn").onclick = () => { if (requireAdmin()) openLog(); };
document.getElementById("logClose").onclick = () => document.getElementById("logModal").classList.remove("show");
document.getElementById("logModal").onclick = (e) => { if (e.target.id === "logModal") document.getElementById("logModal").classList.remove("show"); };

document.getElementById("resetCohort").onclick = () => {
  if (!confirm("確定清空「"+month().name+"　"+cohortLabel(curCohort)+"　"+kindLabel()+"」所有名單？")) return;
  if (curKind === "weekday") month()[curCohort].weekday = blankWeekday();
  else month()[curCohort].weekend = blankWeekend();
  pushSave(); renderAll();
};

document.getElementById("exportBtn").onclick = () => {
  const d = kindData();
  let out = month().name+"　"+cohortLabel(curCohort)+"　"+kindLabel()+"\n";
  if (curKind === "weekday"){
    WEEKDAY_TIMES.forEach((time,i) => {
      const s = d[i];
      out += "\n【"+time+"】\n";
      WEEKDAY_DG.forEach(dg => {
        const g = s[dg.key];
        out += "  "+dg.label+"\n";
        out += "    自排(剩"+(CAP.auto-g.auto.length)+")："+(g.auto.filter(Boolean).join("、")||"—")+"\n";
        out += "    手排(剩"+(CAP.man-g.man.length)+")："+(g.man.filter(Boolean).join("、")||"—")+"\n";
      });
    });
  } else {
    WEEKEND_TIMES.forEach((t,i) => {
      const s = d[i];
      out += "\n【"+t.label+"】\n";
      out += "    自排(剩"+(CAP.auto-s.auto.length)+")："+(s.auto.filter(Boolean).join("、")||"—")+"\n";
      out += "    手排(剩"+(CAP.man-s.man.length)+")："+(s.man.filter(Boolean).join("、")||"—")+"\n";
    });
  }
  navigator.clipboard?.writeText(out).then(
    ()=>alert("已複製到剪貼簿：\n\n"+out),
    ()=>prompt("複製以下內容：", out)
  );
};

onAuthStateChanged(auth, user => {
  if (!user) return;
  setStatus("live", "已連線");
  onSnapshot(DOC, async snap => {
    if (!snap.exists()){
      data = blankData();
      try { await setDoc(DOC, { payload: JSON.stringify(data), updatedAt: Date.now() }); } catch(e){ console.error(e); }
    } else {
      const focused = document.activeElement;
      if (focused && focused.tagName === "INPUT") return;
      applyingRemote = true;
      try { data = migrate(JSON.parse(snap.data().payload)); } catch(e){ data = blankData(); }
      applyingRemote = false;
    }
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "";
    renderAll();
  }, err => {
    setStatus("err", "連線錯誤");
    console.error(err);
    document.getElementById("loading").textContent = "連線失敗：" + err.message;
  });
});

signInAnonymously(auth).catch(err => {
  setStatus("err", "登入失敗");
  document.getElementById("loading").textContent = "匿名登入失敗：" + err.message;
});
</script>
